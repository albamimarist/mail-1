<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İletişim Formu</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    label { display: block; margin: 12px 0 5px; }
    input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
    button { background: #2c7be5; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #1e5bb8; }
  </style>
</head>
<body>

  <h2>Bize Ulaşın</h2>

  <form 
    action="https://formsubmit.co/huseyin@albainsaat.com" 
    method="POST">

    <!-- Spam koruması için (zorunlu değil ama önerilir) -->
    <input type="hidden" name="_subject" value="Yeni İletişim Formu Mesajı - Alba İnşaat">

    <!-- Gönderen bilgileri görünmesin diye -->
    <input type="hidden" name="_from" value="Website İletişim Formu">

    <!-- Kime CC gitmesini istersen (isteğe bağlı) -->
    <!-- <input type="hidden" name="_cc" value="ikinci@mail.com,ucuncu@mail.com"> -->

    <!-- Teşekkür sayfası (isteğe bağlı) -->
    <!-- <input type="hidden" name="_next" value="https://siteniz.com/tesekkur.html"> -->

    <label for="adsoyad">Ad Soyad:</label>
    <input type="text" id="adsoyad" name="Ad Soyad" required placeholder="Adınız Soyadınız">

    <label for="telefon">Telefon:</label>
    <input type="tel" id="telefon" name="Telefon" placeholder="05XX XXX XX XX">

    <label for="email">E-posta Adresi:</label>
    <input type="email" id="email" name="E-posta" required placeholder="ornek@email.com">

    <label for="konu">Konu:</label>
    <input type="text" id="konu" name="Konu" placeholder="Mesajınızın konusu">

    <label for="mesaj">Mesajınız:</label>
    <textarea id="mesaj" name="Mesaj" rows="6" required placeholder="Bize yazmak istediğiniz mesaj..."></textarea>

    <!-- Spam botlarını engellemek için basit bir alan (gizli) -->
    <input type="text" name="_gotcha" style="display:none">

    <button type="submit">Gönder</button>
  </form>

</body>
</html>
